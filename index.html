<head>

<body onload="UpdateColor()">
     <script>
          var t = 0;

          window.onload = setInterval(function UpdateColor()
          {
               var rgb = HSVtoRGB(t % 1, 1, 1);
               document.getElementById('sherbb1').style.color = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
               var rgb = HSVtoRGB((t + .0425) % 1, 1, 1);
               document.getElementById('sherbb2').style.color = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
               var rgb = HSVtoRGB((t + .0425 * 2) % 1, 1, 1);
               document.getElementById('sherbb3').style.color = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
               var rgb = HSVtoRGB((t + .0425 * 3) % 1, 1, 1);
               document.getElementById('sherbb4').style.color = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
               var rgb = HSVtoRGB((t + .0425 * 4) % 1, 1, 1);
               document.getElementById('sherbb5').style.color = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
               var rgb = HSVtoRGB((t + .0425 * 5) % 1, 1, 1);
               document.getElementById('sherbb6').style.color = "rgb(" + rgb.r + "," + rgb.g + "," + rgb.b + ")";
               t += .0007;
          }, 0);

          function HSVtoRGB(h, s, v)
          {
               var r, g, b, i, f, p, q, t;
               if (arguments.length === 1)
               {
                    s = h.s, v = h.v, h = h.h;
               }
               i = Math.floor(h * 6);
               f = h * 6 - i;
               p = v * (1 - s);
               q = v * (1 - f * s);
               t = v * (1 - (1 - f) * s);
               switch (i % 6)
               {
                    case 0: r = v, g = t, b = p; break;
                    case 1: r = q, g = v, b = p; break;
                    case 2: r = p, g = v, b = t; break;
                    case 3: r = p, g = q, b = v; break;
                    case 4: r = t, g = p, b = v; break;
                    case 5: r = v, g = p, b = q; break;
               }
               return {
                    r: Math.round(r * 255),
                    g: Math.round(g * 255),
                    b: Math.round(b * 255)
               };
          }
     </script>
     <div class="FullscreenBox">
          <div class="Text">
               <span id="sherbb1">S<span id="sherbb2">h<span id="sherbb3">e<span id="sherbb4">r<span id="sherbb5">b<span
                                             id="sherbb6">b
          </div>
